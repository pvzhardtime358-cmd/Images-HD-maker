<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision HD & Transparent Tool</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: #eee; text-align: center; padding: 40px; }
        .box { max-width: 600px; margin: auto; background: #222; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        canvas { 
            max-width: 100%; height: auto; margin-top: 20px; border-radius: 8px; 
            background-image: repeating-conic-gradient(#333 0% 25%, #222 0% 50%);
            background-position: 0 0, 10px 10px; background-size: 20px 20px;
        }
        .btn { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 10px 5px; }
        .btn-green { background: #28a745; }
        input[type="file"] { margin-bottom: 20px; }
        .slider-group { margin: 15px 0; text-align: left; }
        label { font-size: 14px; color: #bbb; }
        input[type="range"] { width: 100%; }
        #info { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>HD Precision Tool</h2>
    <p>Sharpen & Remove BG (Stays Original Size)</p>
    
    <input type="file" id="upload" accept="image/*">
    
    <div class="slider-group">
        <label>HD Sharpen Strength</label>
        <input type="range" id="sharpness" min="0" max="100" value="40">
    </div>

    <div class="slider-group">
        <label>Background Removal Sensitivity</label>
        <input type="range" id="transparency" min="0" max="150" value="30">
    </div>

    <button class="btn" onclick="process()">Apply Enhancements</button>
    <button class="btn btn-green" id="saveBtn" style="display:none" onclick="save()">Download PNG</button>
    
    <div id="info"></div>
    <canvas id="canvas"></canvas>
</div>

<script>
    const upload = document.getElementById('upload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let img = new Image();

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (f) => {
            img.onload = () => {
                // LOCK SIZE TO ORIGINAL
                canvas.width = img.width;
                canvas.height = img.height;
                document.getElementById('info').innerText = `Dimensions: ${img.width}px x ${img.height}px`;
                ctx.drawImage(img, 0, 0);
                canvas.style.display = 'block';
            };
            img.src = f.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function process() {
        if (!img.src) return alert("Please upload an image!");

        // 1. Redraw clean image
        ctx.drawImage(img, 0, 0);
        
        // 2. Apply HD Sharpening
        const strength = document.getElementById('sharpness').value / 100;
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imgData.data;
        const w = canvas.width;

        // Sharpening Kernel (Matrix)
        const weights = [0, -1, 0, -1, 5, -1, 0, -1, 0];
        const res = new Uint8ClampedArray(pixels);

        for (let i = w * 4; i < pixels.length - w * 4; i += 4) {
            for (let channel = 0; channel < 3; channel++) {
                const pos = i + channel;
                const val = pixels[pos] * 5 
                          - pixels[pos - 4] 
                          - pixels[pos + 4] 
                          - pixels[pos - w * 4] 
                          - pixels[pos + w * 4];
                
                // Blend original with sharpened version based on strength
                res[pos] = pixels[pos] + (val - pixels[pos]) * strength;
            }
        }

        // 3. Apply Transparency
        const threshold = document.getElementById('transparency').value;
        const rBG = res[0], gBG = res[1], bBG = res[2]; // Take top-left pixel as BG color

        for (let i = 0; i < res.length; i += 4) {
            const r = res[i], g = res[i+1], b = res[i+2];
            const diff = Math.sqrt((r-rBG)**2 + (g-gBG)**2 + (b-bBG)**2);
            if (diff < threshold) res[i+3] = 0;
        }

        ctx.putImageData(new ImageData(res, canvas.width, canvas.height), 0, 0);
        document.getElementById('saveBtn').style.display = 'inline-block';
    }

    function save() {
        const link = document.createElement('a');
        link.download = 'HD_Transparent.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
